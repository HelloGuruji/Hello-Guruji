<!DOCTYPE html>
<html>
<head>
<title>Become a Tutor | Hello Guruji</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fb;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
text-align:center;
}

.logo img{
height:80px;
}

h1{
text-align:center;
color:#0F2D52;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#FF7A00;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

label{
font-weight:bold;
}

.success{
display:none;
background:#d4edda;
color:#155724;
padding:15px;
border-radius:5px;
margin-bottom:15px;
}

.note{
background:#fff7ef;
padding:15px;
border-left:5px solid #FF7A00;
margin-bottom:20px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="Hello Guruji">
</div>

<h1>Become a Tutor</h1>

<p class="subtitle">
Teach. Earn. Grow with Hello Guruji.
</p>

<div class="note">
Fill this form carefully. Our team will contact shortlisted tutors for verification.
</div>

<div class="success" id="successMsg">
Registration Submitted Successfully!
</div>

<form id="tutorForm">

<label>Full Name *</label>
<input type="text" name="name" required>

<label>Mobile Number *</label>
<input type="tel" name="mobile" required>

<label>WhatsApp Number *</label>
<input type="tel" name="whatsapp" required>

<label>City *</label>
<input type="text" name="city" required>

<label>Qualification *</label>
<input type="text" name="qualification">

<label>Subjects You Can Teach *</label>
<input type="text" name="subjects">

<label>Classes You Can Teach *</label>
<input type="text" name="classes">

<label>Teaching Experience</label>
<select name="experience">
<option>Fresher</option>
<option>1 Year</option>
<option>2+ Years</option>
<option>5+ Years</option>
</select>

<label>Preparing For</label>
<input type="text" name="exam" placeholder="SSC, Railway, BPSC, Banking">

<label>Preferred Teaching Area</label>
<textarea rows="4" name="area"></textarea>

<button type="submit">
Submit Registration
</button>

</form>

</div>

<script>

document.getElementById("tutorForm").addEventListener("submit", async function(e){

e.preventDefault();

const data = {
type:"tutor",
name:this.name.value,
mobile:this.mobile.value,
whatsapp:this.whatsapp.value,
city:this.city.value,
qualification:this.qualification.value,
subjects:this.subjects.value,
classes:this.classes.value,
experience:this.experience.value,
exam:this.exam.value,
area:this.area.value
};

try{

await fetch(
"https://script.google.com/macros/s/AKfycbzY8Jfmt04VMcBjM8NdttkfdyuDkbgDpvn1LOZVOsRj2Qc-bDjqdWHlA0ek8PD8unKX8w/exec",
{
method:"POST",
body:JSON.stringify(data)
}
);

document.getElementById("successMsg").style.display="block";

document.getElementById("tutorForm").reset();

window.scrollTo(0,0);

}
catch(error){

alert("Submission Failed. Please try again.");

}

});

</script>

</body>
</html>
