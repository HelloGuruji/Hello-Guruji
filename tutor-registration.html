<!DOCTYPE html>
<html>
<head>
<title>Become a Tutor | Hello Guruji</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
padding:20px;
}
.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.logo{
text-align:center;
}
.logo img{
height:80px;
}
h1{
text-align:center;
color:#0F2D52;
}
input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}
button{
background:#FF7A00;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:5px;
font-size:18px;
cursor:pointer;
}
label{
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="Hello Guruji">
</div>

<h1>Become a Tutor</h1>

<form>

<label>Full Name</label>
<input type="text">

<label>Mobile Number</label>
<input type="tel">

<label>WhatsApp Number</label>
<input type="tel">

<label>City</label>
<input type="text">

<label>Qualification</label>
<input type="text">

<label>Subjects You Can Teach</label>
<input type="text">

<label>Classes You Can Teach</label>
<input type="text">

<label>Teaching Experience</label>
<select>
<option>Fresher</option>
<option>1 Year</option>
<option>2+ Years</option>
<option>5+ Years</option>
</select>

<label>Preparing For</label>
<input type="text" placeholder="SSC, Railway, BPSC, Banking">

<label>Preferred Teaching Area</label>
<textarea rows="4"></textarea>

<button type="submit">
Submit Registration
</button>

</form>

</div>

</body>
</html>
